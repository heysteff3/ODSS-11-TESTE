    # valor padrão para desenvolvimento; sobrescreva via variável de ambiente APP_JWT_SECRET em produção
    secret: ${APP_JWT_SECRET:12345678901234567890123456789012}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
